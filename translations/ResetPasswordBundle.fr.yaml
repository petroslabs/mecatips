# Surcharge des messages du bundle symfonycasts/reset-password-bundle (sa
# propre traduction FR est au vouvoiement, incohérent avec le tutoiement
# utilisé partout ailleurs sur MécaTips).
'There was a problem validating your password reset request': "Un problème est survenu en validant ta demande de réinitialisation."
'There was a problem handling your password reset request': "Un problème est survenu en traitant ta demande de réinitialisation."
'The link in your email is expired. Please try to reset your password again.': "Le lien reçu par email a expiré, réessaie de réinitialiser ton mot de passe."
'The reset password link is invalid. Please try to reset your password again.': "Ce lien de réinitialisation n'est pas valide, réessaie."
'You have already requested a reset password email. Please check your email or try again soon.': "Tu as déjà demandé un email de réinitialisation — vérifie ta boîte mail, ou réessaie un peu plus tard."
'%count% year|%count% years': "%count% an|%count% ans"
'%count% month|%count% months': "%count% mois|%count% mois"
'%count% day|%count% days': "%count% jour|%count% jours"
'%count% hour|%count% hours': "%count% heure|%count% heures"
'%count% minute|%count% minutes': "%count% minute|%count% minutes"
