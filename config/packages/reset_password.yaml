symfonycasts_reset_password:
    request_password_repository: App\Repository\ResetPasswordRequestRepository
    # Défaut du bundle (3600s) trop restrictif : un utilisateur qui n'a pas
    # reçu l'email (délai réseau, dossier spam...) ou s'est trompé
    # d'adresse doit pouvoir retenter vite, sans attendre une heure — 5
    # minutes suffit largement à décourager un flood automatisé.
    throttle_limit: 300
