framework:
    messenger:
        failure_transport: failed

        transports:
            # https://symfony.com/doc/current/messenger.html#transport-configuration
            async:
                dsn: '%env(MESSENGER_TRANSPORT_DSN)%'
                retry_strategy:
                    max_retries: 3
                    multiplier: 2
            failed: 'doctrine://default?queue_name=failed'
            # sync: 'sync://'

        default_bus: messenger.bus.default

        buses:
            messenger.bus.default: []

        routing:
            # SendEmailMessage volontairement pas routé vers "async" : ça
            # suppose un worker (messenger:consume) qui tourne en permanence,
            # jamais mis en place dans cette infra (aucun service dédié dans
            # le Dockerfile/compose). Pour le volume d'emails de MécaTips
            # (mot de passe oublié), l'envoi synchrone est plus simple et ne
            # laisse pas un email se coincer silencieusement dans une file
            # jamais consommée.
            Symfony\Component\Notifier\Message\ChatMessage: async
            Symfony\Component\Notifier\Message\SmsMessage: async

            # Route your messages to the transports
            # 'App\Message\YourMessage': async
