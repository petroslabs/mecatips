doctrine:
    dbal:
        url: '%env(resolve:DATABASE_URL)%'

        # IMPORTANT: You MUST configure your server version,
        # either here or in the DATABASE_URL env var (see .env file)
        #server_version: '16'

        profiling_collect_backtrace: '%kernel.debug%'

        # Types custom stockant le `name` des enums PHP (identifiant anglais
        # stable) plutôt que leur `value` (réservée à l'affichage en
        # français) — voir App\Doctrine\Types\EnumNameType.
        types:
            tip_type: App\Doctrine\Types\TipTypeType
            tip_status: App\Doctrine\Types\TipStatusType
            revision_status: App\Doctrine\Types\RevisionStatusType
            vote_decision: App\Doctrine\Types\VoteDecisionType
            vehicle_status: App\Doctrine\Types\VehicleStatusType
            report_status: App\Doctrine\Types\ReportStatusType
            notification_type: App\Doctrine\Types\NotificationTypeType
    orm:
        validate_xml_mapping: true
        naming_strategy: doctrine.orm.naming_strategy.underscore
        identity_generation_preferences:
            Doctrine\DBAL\Platforms\PostgreSQLPlatform: identity
        auto_mapping: true
        mappings:
            App:
                type: attribute
                is_bundle: false
                dir: '%kernel.project_dir%/src/Entity'
                prefix: 'App\Entity'
                alias: App

when@test:
    doctrine:
        dbal:
            # "TEST_TOKEN" is typically set by ParaTest
            dbname_suffix: '_test%env(default::TEST_TOKEN)%'

when@prod:
    doctrine:
        orm:
            query_cache_driver:
                type: pool
                pool: doctrine.system_cache_pool
            result_cache_driver:
                type: pool
                pool: doctrine.result_cache_pool

    framework:
        cache:
            pools:
                doctrine.result_cache_pool:
                    adapter: cache.app
                doctrine.system_cache_pool:
                    adapter: cache.system
