# Anti-spam sur les soumissions de tips (ROADMAP.md, section "Transverse").
# Comptabilisé par compte (la soumission exige déjà d'être connecté), pas par
# IP. Limite volontairement généreuse : elle doit gêner un flood automatisé,
# pas un contributeur qui documente plusieurs tips après une session de
# réparation.
framework:
    rate_limiter:
        tip_submission:
            policy: sliding_window
            limit: 5
            interval: '1 hour'

        # Anti-spam sur l'inscription (`/register`) : par IP puisqu'il n'y a
        # pas encore de compte à cette étape. Compte chaque tentative
        # soumise, valide ou non — contrairement à tip_submission, un bot qui
        # flood le formulaire avec des données invalides doit être arrêté
        # aussi, pas seulement une création de compte réussie.
        registration:
            policy: sliding_window
            limit: 10
            interval: '1 hour'
