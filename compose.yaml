services:
  app:
    build:
      context: .
      target: frankenphp_prod
    container_name: mecatips_app
    restart: unless-stopped
    networks:
      - symfony_env
    labels:
      - "traefik.enable=true"
      # HTTP → HTTPS
      - "traefik.http.routers.mecatips-http.entrypoints=http"
      - "traefik.http.routers.mecatips-http.rule=Host(`${APP_DOMAIN:-mecatips.localhost}`)"
      - "traefik.http.routers.mecatips-http.middlewares=https-redirect"
      # HTTPS
      - "traefik.http.routers.mecatips.entrypoints=https"
      - "traefik.http.routers.mecatips.rule=Host(`${APP_DOMAIN:-mecatips.localhost}`)"
      - "traefik.http.routers.mecatips.tls=true"
      - "traefik.http.routers.mecatips.tls.certresolver=letsencrypt"
      - "traefik.http.services.mecatips.loadbalancer.server.port=80"

networks:
  symfony_env:
    external: true
